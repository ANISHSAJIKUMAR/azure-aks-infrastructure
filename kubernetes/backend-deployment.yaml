apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: origenai/cloud-engineer-test-sample-app-backend:1.0.0
        ports:
        - containerPort: 3001
        env:
        - name: MONGODB_URI
          value: "mongodb://username:password@mongo:27017/admin"
